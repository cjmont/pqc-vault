name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust core (fmt, clippy, tests + ACVP)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format check
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Core tests + ACVP conformance vectors
        run: cargo test -p pqc-vault-core -- --nocapture

  node:
    name: Node binding (${{ matrix.os }}, Node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: packages/pqc-vault/package-lock.json
      - name: Install deps
        working-directory: packages/pqc-vault
        run: npm ci
      - name: Build native addon (debug)
        working-directory: packages/pqc-vault
        run: npm run build:rust:debug
      - name: Build TypeScript (ESM + CJS + d.ts)
        working-directory: packages/pqc-vault
        run: npm run build:ts
      - name: Node integration tests
        working-directory: packages/pqc-vault
        run: npm test
